version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: saas_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: MudeEstaSenhaAgora@2026
      POSTGRES_DB: saas
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - saas_network

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: always
    volumes:
      - ./redis:/data
    ports:
      - "6379:6379"
    networks:
      - saas_network

  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: saas_evolution
    restart: always
    environment:
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://admin:MudeEstaSenhaAgora@2026@postgres:5432/evolution
      - DATABASE_URL=postgresql://admin:MudeEstaSenhaAgora@2026@postgres:5432/evolution
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URI=redis://redis:6379
      - REDIS_URL=redis://redis:6379
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - INSTANCE_NAME=evolution
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=ba1add1dc7fbe706bfcb9afb78154402bd1e30813abe36d8c22c62532a50b3df
      - REJECT_CALL=true
      - MSG_CALL_REJECTED=Desculpe, este número não recebe chamadas. Por favor, envie uma mensagem de texto.
      - SET_MESSAGES_AS_READ=false
      - READ_MESSAGES=false
    volumes:
      - ./evolution:/app/instances
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - saas_network

  nextjs:
    build:
      context: ./nextjs
      dockerfile: Dockerfile
    container_name: saas_nextjs
    restart: always
    env_file:
      - ./nextjs/.env
    environment:
      - NEXTAUTH_SECRET=MudeEstaChaveSecreta@2026
      - NEXTAUTH_URL=http://localhost:3000
      - EVOLUTION_URL=http://evolution:8080
      - EVOLUTION_API_KEY=ba1add1dc7fbe706bfcb9afb78154402bd1e30813abe36d8c22c62532a50b3df
      # Configure sua chave Groq em: https://console.groq.com/keys
      # - GROQ_API_KEY=gsk_sua_chave_aqui
      - CRON_SECRET=minhasenha
      - ASAAS_API_KEY=
      - ASAAS_API_URL=https://sandbox.asaas.com/api/v3
      # Chave de API do Asaas (sandbox ou produção). Necessário para assinaturas.
      - ASAAS_API_KEY=
      # URL da API do Asaas (sandbox: https://sandbox.asaas.com/api/v3, produção: https://asaas.com/api/v3)
      - ASAAS_API_URL=https://sandbox.asaas.com/api/v3
      # SMTP para envio de emails (recuperação de senha, notificações)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@seudominio.com}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - saas_network

  worker:
    build:
      context: ./nextjs
      dockerfile: Dockerfile
    container_name: saas_worker
    restart: always
    command: npx tsx src/worker.ts
    env_file:
      - ./nextjs/.env
    environment:
      - IS_WORKER=true
      - EVOLUTION_URL=http://evolution:8080
      - EVOLUTION_API_KEY=ba1add1dc7fbe706bfcb9afb78154402bd1e30813abe36d8c22c62532a50b3df
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@seudominio.com}
    depends_on:
      - postgres
      - redis
    networks:
      - saas_network

  manager:
    build:
      context: ./evolution-manager
      dockerfile: Dockerfile
      args:
        - VITE_EVOLUTION_API_URL=http://localhost:3000/api/proxy/evolution
        - VITE_EVOLUTION_API_KEY=vendas_saas_proxy_key
    container_name: saas_manager
    restart: always
    environment:
      - VITE_EVOLUTION_API_URL=http://localhost:3000/api/proxy/evolution
      - VITE_EVOLUTION_API_KEY=vendas_saas_proxy_key
    volumes:
      - ./manager-nginx.conf:/etc/nginx/conf.d/nginx.conf
    ports:
      - "3001:80"
    networks:
      - saas_network

networks:
  saas_network:
    driver: bridge