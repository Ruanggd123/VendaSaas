version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: saas_evolution_redis
    restart: always
    volumes:
      - ./redis_evolution:/data
    ports:
      - "6379:6379"
    networks:
      - evolution_network

  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: saas_evolution_api
    restart: always
    environment:
      # Configuração para rodar local leve (SQLite)
      - DATABASE_PROVIDER=sqlite
      - DATABASE_CONNECTION_URI=sqlite://database/evolution.db?connection_limit=1
      
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - REDIS_PREFIX_KEY=evo
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=vendas_saas_global_key_2026
      
      # Webhooks e configurações de Chat
      - SET_MESSAGES_AS_READ=false
      - READ_MESSAGES=false
      - REJECT_CALL=true
      - MSG_CALL_REJECTED=Desculpe, nosso sistema é 100% automático e não recebe chamadas. Envie texto ou áudio.
      
      # Permitir todas origens (CORS)
      - CORS_ORIGIN=*
    volumes:
      - ./evolution_data:/app/instances
      - ./evolution_db:/app/database
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - evolution_network

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: saas_evolution_tunnel
    restart: always
    command: tunnel --url http://evolution:8080
    depends_on:
      - evolution
    networks:
      - evolution_network

networks:
  evolution_network:
    driver: bridge
