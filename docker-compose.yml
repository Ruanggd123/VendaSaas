version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "9229:9229" # Porta para debug do Node.js
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_WIDGET_URL: /whatsapp-widget.js
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-dev_key}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET:-dev_secret}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}
      CHOKIDAR_USEPOLLING: "true" # Melhora watch de arquivos no Docker
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - redis
    restart: unless-stopped
    stdin_open: true
    tty: true

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

volumes:
  redis_data:
